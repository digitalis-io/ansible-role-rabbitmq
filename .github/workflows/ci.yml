name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "defaults/**"
      - "handlers/**"
      - "meta/**"
      - "tasks/**"
      - "templates/**"
      - "molecule/**"
    tags:
      - "v*"
  pull_request:
    paths:
      - "defaults/**"
      - "handlers/**"
      - "meta/**"
      - "tasks/**"
      - "templates/**"
      - "molecule/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ansible-core ansible-lint yamllint pre-commit
      - run: pre-commit run --all-files

  molecule:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          # - platform: rockylinux9
          #   image: geerlingguy/docker-rockylinux9-ansible
          # - platform: rockylinux10
          #   image: geerlingguy/docker-rockylinux10-ansible
          # - platform: ubuntu2204
          #   image: geerlingguy/docker-ubuntu2204-ansible
          # - platform: ubuntu2404
          #   image: geerlingguy/docker-ubuntu2404-ansible
          # - platform: debian12
          #   image: geerlingguy/docker-debian12-ansible
          - platform: debian13
            image: geerlingguy/docker-debian13-ansible
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ansible-core "molecule-plugins[docker]" docker
      - run: ansible-galaxy collection install -r requirements.yml
      - run: MOLECULE_IMAGE=${{ matrix.image }} molecule -v converge

  publish:
    runs-on: ubuntu-latest
    needs: [lint, molecule]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ansible-core
      - name: Package role as tarball
        run: |
          VERSION=${GITHUB_REF_NAME}
          tar --exclude='.git' --exclude='.github' --exclude='molecule' \
              -czf "ansible-role-rabbitmq-${VERSION}.tar.gz" .
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ansible-role-rabbitmq-${{ github.ref_name }}
          path: ansible-role-rabbitmq-${{ github.ref_name }}.tar.gz
          retention-days: 90
      - name: Publish to Ansible Galaxy
        run: |
          NS=$(grep namespace: meta/main.yml | awk '{print $2}')
          ansible-galaxy role import --token "${{ secrets.GALAXY_API_KEY }}" $NS ansible-role-rabbitmq
