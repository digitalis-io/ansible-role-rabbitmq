---
- name: Ensure EPEL is installed
  ansible.builtin.package:
    name: epel-release
    state: present

- name: Configure RabbitMQ YUM repository
  ansible.builtin.template:
    src: rabbitmq.repo.j2
    dest: /etc/yum.repos.d/rabbitmq.repo
    mode: "0644"

- name: Clean DNF metadata for RabbitMQ repos
  ansible.builtin.command:
    cmd: dnf clean metadata --disablerepo="*" --enablerepo="modern-erlang,modern-erlang-noarch,rabbitmq-el*"
  changed_when: false

- name: Import RabbitMQ RPM signing keys
  ansible.builtin.rpm_key:
    state: present
    key: "{{ item }}"
  loop:
    - https://github.com/rabbitmq/signing-keys/releases/download/3.0/rabbitmq-release-signing-key.asc
    - https://github.com/rabbitmq/signing-keys/releases/download/3.0/cloudsmith.rabbitmq-erlang.E495BB49CC4BBE5B.key
    - https://github.com/rabbitmq/signing-keys/releases/download/3.0/cloudsmith.rabbitmq-server.9F4587F226208342.key

- name: Install Erlang and RabbitMQ server
  ansible.builtin.dnf:
    name:
      - erlang
      - rabbitmq-server
    state: present
    update_cache: true
  tags:
    - rabbitmq-server
    - packages
